<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>今日星座运势</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #f9f7f5;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .card {
            max-width: 500px;
            width: 100%;
            margin: 0 auto;
            background: white;
            border-radius: 32px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            overflow: hidden;
            padding: 24px 20px 32px;
        }
        h1 {
            font-size: 28px;
            font-weight: 600;
            text-align: center;
            color: #1e2a3e;
            letter-spacing: -0.3px;
            margin-bottom: 8px;
        }
        .sub {
            text-align: center;
            color: #7c8b9b;
            font-size: 14px;
            margin-bottom: 28px;
            border-bottom: 1px solid #eee;
            padding-bottom: 16px;
        }
        .sign-selector {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            margin-bottom: 28px;
        }
        .sign-btn {
            background: #f0f2f5;
            border: none;
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 15px;
            font-weight: 500;
            color: #2c3e50;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .sign-btn.active {
            background: #1e2a3e;
            color: white;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .date {
            text-align: center;
            font-size: 16px;
            font-weight: 500;
            color: #b23c1c;
            background: #fff2e9;
            display: inline-block;
            padding: 6px 16px;
            border-radius: 30px;
            margin: 0 auto 20px;
            width: fit-content;
        }
        .horoscope-content {
            background: #fefaf5;
            border-radius: 28px;
            padding: 24px 20px;
            margin: 16px 0 12px;
            line-height: 1.55;
            font-size: 17px;
            color: #2c3e2f;
            border: 1px solid #f0e5d8;
        }
        .meta-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 20px;
            font-size: 14px;
            color: #6b5a4e;
            background: #fff6ef;
            border-radius: 24px;
            padding: 16px;
        }
        .meta-item {
            flex: 1;
            min-width: 80px;
            text-align: center;
        }
        .meta-label {
            font-weight: 500;
            color: #b45f2b;
            font-size: 12px;
            margin-bottom: 4px;
        }
        .loading {
            text-align: center;
            padding: 40px 20px;
            color: #8e9aaf;
        }
        footer {
            text-align: center;
            font-size: 11px;
            color: #bbb;
            margin-top: 24px;
            border-top: 1px solid #eee;
            padding-top: 20px;
        }
        @media (max-width: 480px) {
            .card { padding: 20px 16px 28px; }
            .sign-btn { padding: 6px 14px; font-size: 14px; }
            .horoscope-content { font-size: 16px; padding: 20px; }
        }
    </style>
</head>
<body>
<div class="card">
    <h1>✨ 星座运势</h1>
    <div class="sub">每日更新 · 纯粹简洁</div>

    <div class="sign-selector" id="signSelector">
        <!-- 动态生成星座按钮 -->
    </div>

    <div id="resultArea">
        <div class="loading">点击上方星座，查看今日运势</div>
    </div>
    <footer>数据来源：聚合公益API · 无版权保护</footer>
</div>

<script>
    // 星座列表（中文）
    const signs = [
        "白羊座", "金牛座", "双子座", "巨蟹座",
        "狮子座", "处女座", "天秤座", "天蝎座",
        "射手座", "摩羯座", "水瓶座", "双鱼座"
    ];
    // 英文映射（API需要）
    const signMap = {
        "白羊座": "白羊", "金牛座": "金牛", "双子座": "双子", "巨蟹座": "巨蟹",
        "狮子座": "狮子", "处女座": "处女", "天秤座": "天秤", "天蝎座": "天蝎",
        "射手座": "射手", "摩羯座": "摩羯", "水瓶座": "水瓶", "双鱼座": "双鱼"
    };

    let currentSign = "白羊座";

    // 生成按钮
    const container = document.getElementById("signSelector");
    signs.forEach(sign => {
        const btn = document.createElement("button");
        btn.textContent = sign;
        btn.classList.add("sign-btn");
        if (sign === currentSign) btn.classList.add("active");
        btn.addEventListener("click", () => {
            document.querySelectorAll(".sign-btn").forEach(b => b.classList.remove("active"));
            btn.classList.add("active");
            currentSign = sign;
            fetchHoroscope(sign);
        });
        container.appendChild(btn);
    });

    // 获取运势（使用稳定的公益API）
    async function fetchHoroscope(signName) {
        const resultDiv = document.getElementById("resultArea");
        resultDiv.innerHTML = `<div class="loading">✨ 正在感应星象...</div>`;

        const signCn = signMap[signName];
        const apiUrl = `https://api.xma.run/api/tools/fortune/?astro=${encodeURIComponent(signCn)}`;

        try {
            const response = await fetch(apiUrl);
            if (!response.ok) throw new Error('API响应失败');
            const data = await response.json();
            
            if (data.code !== 0) throw new Error(data.msg || '获取数据失败');
            
            // 解析返回的数据
            const fortuneData = data.data;
            // 综合运势作为主要描述
            const description = fortuneData.fortune[0]?.desc || "暂无运势描述";
            // 其他运势信息
            const love = fortuneData.fortune[1]?.desc || "暂无";
            const career = fortuneData.fortune[2]?.desc || "暂无";
            const wealth = fortuneData.fortune[5]?.desc || "暂无";
            // 幸运信息
            const color = fortuneData.luck?.color || "未知";
            const luckyNumber = fortuneData.luck?.number || "?";
            
            // 获取当前日期
            const today = new Date();
            const currentDate = `${today.getFullYear()}年${today.getMonth()+1}月${today.getDate()}日`;

            const html = `
                <div style="text-align:center; margin-bottom:12px;">
                    <span class="date">📅 ${currentDate}</span>
                </div>
                <div class="horoscope-content">
                    ${description}
                </div>
                <div class="meta-grid">
                    <div class="meta-item"><div class="meta-label">💑 爱情运势</div><div style="font-size:12px; line-height:1.3;">${love.substring(0, 30)}${love.length > 30 ? '...' : ''}</div></div>
                    <div class="meta-item"><div class="meta-label">💼 事业运势</div><div style="font-size:12px; line-height:1.3;">${career.substring(0, 30)}${career.length > 30 ? '...' : ''}</div></div>
                    <div class="meta-item"><div class="meta-label">💰 财富运势</div><div style="font-size:12px; line-height:1.3;">${wealth.substring(0, 30)}${wealth.length > 30 ? '...' : ''}</div></div>
                    <div class="meta-item"><div class="meta-label">🎨 幸运色</div><div>${color}</div></div>
                    <div class="meta-item"><div class="meta-label">🔢 幸运数字</div><div>${luckyNumber}</div></div>
                </div>
                <div style="font-size:12px; color:#999; text-align:center; margin-top:16px;">
                    小贴士：${fortuneData.fitting || "保持好心情"} | 避免：${fortuneData.avoid || "急躁"}
                </div>
            `;
            resultDiv.innerHTML = html;
        } catch (err) {
            console.error(err);
            resultDiv.innerHTML = `<div class="loading">⚠️ 获取失败，请稍后重试或切换网络环境</div>`;
        }
    }

    // 默认加载白羊座运势
    fetchHoroscope(currentSign);
</script>
</body>
</html>
