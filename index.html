<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>今日星座运势</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #f9f7f5;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .card {
            max-width: 500px;
            width: 100%;
            margin: 0 auto;
            background: white;
            border-radius: 32px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            overflow: hidden;
            padding: 24px 20px 32px;
        }
        h1 {
            font-size: 28px;
            font-weight: 600;
            text-align: center;
            color: #1e2a3e;
            letter-spacing: -0.3px;
            margin-bottom: 8px;
        }
        .sub {
            text-align: center;
            color: #7c8b9b;
            font-size: 14px;
            margin-bottom: 28px;
            border-bottom: 1px solid #eee;
            padding-bottom: 16px;
        }
        .sign-selector {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            margin-bottom: 28px;
        }
        .sign-btn {
            background: #f0f2f5;
            border: none;
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 15px;
            font-weight: 500;
            color: #2c3e50;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .sign-btn.active {
            background: #1e2a3e;
            color: white;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .date {
            text-align: center;
            font-size: 16px;
            font-weight: 500;
            color: #b23c1c;
            background: #fff2e9;
            display: inline-block;
            padding: 6px 16px;
            border-radius: 30px;
            margin: 0 auto 20px;
            width: fit-content;
        }
        .horoscope-content {
            background: #fefaf5;
            border-radius: 28px;
            padding: 24px 20px;
            margin: 16px 0 12px;
            line-height: 1.55;
            font-size: 17px;
            color: #2c3e2f;
            border: 1px solid #f0e5d8;
        }
        .meta-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 20px;
            font-size: 14px;
            color: #6b5a4e;
            background: #fff6ef;
            border-radius: 24px;
            padding: 16px;
        }
        .meta-item {
            flex: 1;
            min-width: 80px;
            text-align: center;
        }
        .meta-label {
            font-weight: 500;
            color: #b45f2b;
            font-size: 12px;
            margin-bottom: 4px;
        }
        .loading {
            text-align: center;
            padding: 40px 20px;
            color: #8e9aaf;
        }
        footer {
            text-align: center;
            font-size: 11px;
            color: #bbb;
            margin-top: 24px;
            border-top: 1px solid #eee;
            padding-top: 20px;
        }
        @media (max-width: 480px) {
            .card { padding: 20px 16px 28px; }
            .sign-btn { padding: 6px 14px; font-size: 14px; }
            .horoscope-content { font-size: 16px; padding: 20px; }
        }
    </style>
</head>
<body>
<div class="card">
    <h1>✨ 星座运势</h1>
    <div class="sub">每日更新 · 纯粹简洁</div>

    <div class="sign-selector" id="signSelector">
        <!-- 动态生成星座按钮 -->
    </div>

    <div id="resultArea">
        <div class="loading">点击上方星座，查看今日运势</div>
    </div>
    <footer>数据来源：Aztro 免费公开API · 无版权保护</footer>
</div>

<script>
    // 星座列表（中文）
    const signs = [
        "白羊座", "金牛座", "双子座", "巨蟹座",
        "狮子座", "处女座", "天秤座", "天蝎座",
        "射手座", "摩羯座", "水瓶座", "双鱼座"
    ];
    // 英文映射（API需要）
    const signMap = {
        "白羊座": "aries", "金牛座": "taurus", "双子座": "gemini", "巨蟹座": "cancer",
        "狮子座": "leo", "处女座": "virgo", "天秤座": "libra", "天蝎座": "scorpio",
        "射手座": "sagittarius", "摩羯座": "capricorn", "水瓶座": "aquarius", "双鱼座": "pisces"
    };

    let currentSign = "白羊座";

    // 生成按钮
    const container = document.getElementById("signSelector");
    signs.forEach(sign => {
        const btn = document.createElement("button");
        btn.textContent = sign;
        btn.classList.add("sign-btn");
        if (sign === currentSign) btn.classList.add("active");
        btn.addEventListener("click", () => {
            document.querySelectorAll(".sign-btn").forEach(b => b.classList.remove("active"));
            btn.classList.add("active");
            currentSign = sign;
            fetchHoroscope(sign);
        });
        container.appendChild(btn);
    });

    // 获取运势
    async function fetchHoroscope(signName) {
        const resultDiv = document.getElementById("resultArea");
        resultDiv.innerHTML = `<div class="loading">✨ 正在感应星象...</div>`;

        const signEn = signMap[signName];
        const today = new Date().toISOString().split('T')[0]; // 用于显示，但API用today参数

        try {
            const response = await fetch(`https://aztro.sameerkumar.website?sign=${signEn}&day=today`, {
                method: 'POST'
            });
            if (!response.ok) throw new Error('网络错误');
            const data = await response.json();

            // 格式化展示
            const html = `
                <div style="text-align:center; margin-bottom:12px;">
                    <span class="date">📅 ${data.current_date}</span>
                </div>
                <div class="horoscope-content">
                    ${data.description}
                </div>
                <div class="meta-grid">
                    <div class="meta-item"><div class="meta-label">💑 匹配星座</div><div>${data.compatibility}</div></div>
                    <div class="meta-item"><div class="meta-label">😊 心情指数</div><div>${data.mood}</div></div>
                    <div class="meta-item"><div class="meta-label">🎨 幸运色</div><div>${data.color}</div></div>
                    <div class="meta-item"><div class="meta-label">🔢 幸运数字</div><div>${data.lucky_number}</div></div>
                    <div class="meta-item"><div class="meta-label">⏰ 幸运时段</div><div>${data.lucky_time}</div></div>
                </div>
            `;
            resultDiv.innerHTML = html;
        } catch (err) {
            resultDiv.innerHTML = `<div class="loading">⚠️ 获取失败，请检查网络或稍后重试</div>`;
            console.error(err);
        }
    }

    // 默认加载白羊座运势
    fetchHoroscope(currentSign);
</script>
</body>
</html>
